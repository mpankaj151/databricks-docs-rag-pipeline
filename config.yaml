# ============================================
# Databricks RAG Pipeline Configuration
# ============================================

# ---------- EMBEDDINGS ----------
embeddings:
  model: "sentence-transformers/all-mpnet-base-v2"
  batch_size: 64

# ---------- LLM ----------
llm:
  provider: "ollama"
  model: "qwen3.5:cloud"
  base_url: "http://localhost:11434"
  temperature: 0.2
  max_tokens: 512

# ---------- CHUNKING ----------
chunk_size_tokens: 256
chunk_overlap_tokens: 50

# ---------- RETRIEVAL ----------
top_k: 5

# ---------- INTEGRATIONS ----------
integrations:
  # REST API Server
  rest_api:
    enabled: true
    host: "0.0.0.0"
    port: 8000
  
  # Tool/MCP Definition
  tool:
    enabled: true
    auto_trigger: true
    keywords:
      - "delta lake"
      - "delta table"
      - "databricks"
      - "lakeflow"
      - "spark sql"
      - "pyspark"
      - "lakehouse"
      - "create table"
      - "merge into"
      - "upsert"
  
  # LangChain Tool
  langchain:
    enabled: false
  
  # AWS Lambda
  lambda:
    enabled: false
  
  # CLI
  cli:
    enabled: true