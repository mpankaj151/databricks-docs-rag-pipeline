# ============================================
# Databricks RAG Pipeline Configuration
# ============================================

# ---------- EMBEDDINGS ----------
embeddings:
  model: "sentence-transformers/all-mpnet-base-v2"
  batch_size: 64

# ---------- LLM ----------
llm:
  provider: "ollama"                  # ollama | anthropic | openai | bedrock
  model: "qwen3.5:cloud"
  base_url: "http://localhost:11434"
  temperature: 0.2
  max_tokens: 512
  api_key: ""                        # set or use env var

  # Anti-hallucination prompt — per-provider override
  # Falls back to built-in default if empty
  strict_prompt: |
    You must answer using ONLY the provided context below.

    RULES:
    1. Answer ONLY from the context provided
    2. If the context doesn't contain the answer, say "I don't have enough information"
    3. NEVER use your own knowledge or make assumptions
    4. Be concise and factual
    5. If code examples are in the context, include them in your answer

    Context:
    {context}

    Question: {question}

    Answer (using ONLY context above):

# ---------- CHUNKING ----------
chunk_size_tokens: 256
chunk_overlap_tokens: 50

# ---------- RETRIEVAL ----------
top_k: 5

# ---------- INTEGRATIONS ----------
integrations:
  # REST API Server
  rest_api:
    enabled: true
    host: "0.0.0.0"
    port: 8000
  
  # Tool/MCP Definition
  tool:
    enabled: true
    auto_trigger: true
    keywords:
      - "delta lake"
      - "delta table"
      - "databricks"
      - "lakeflow"
      - "spark sql"
      - "pyspark"
      - "lakehouse"
      - "create table"
      - "merge into"
      - "upsert"
  
  # LangChain Tool
  langchain:
    enabled: false
  
  # AWS Lambda
  lambda:
    enabled: false
  
  # CLI
  cli:
    enabled: true